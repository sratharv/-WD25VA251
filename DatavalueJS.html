<script>
    //Primitive : Single Value (Immutable)
     //String/Number/Boolean/Null/Undefined/Symbol/BigInt
      let name = "Abcd";

      let age = 23;
      let isMarried=false;
      let address = null;
      let education;
      console.log(age);
      console.log(typeof(age));
      
      //Bigintage

      let salary = BigInt(273498793248293989874);

      //symbol
      /* let student = {

    //Non - primitive/Refrence/object(Mutable)
     // Object / Array / Function
     //object
     let student={
        name : "Atharv",
        age : 17,
        isMarried:false,
        address:{
            streetno:45,
            area:"Lucknow",
            city:"gzb"
                },
    course:"Btech"
 
     };
     console.log(student.name);
     // Find object,s property in object
     console.log("age" in student)
      // delete object,s property in object
     console.log(delete student.name);
     console.log( student);
     console.log("name" in student);
     //access objects key /property using bracket notation
     console.log(student ['isMarried']);
</script>
